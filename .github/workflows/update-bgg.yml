name: Update BGG Collection

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install cloudscraper requests playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch BGG data and build collection JSON
        env:
          BGG_USERNAME: ${{ secrets.BGG_USERNAME }}
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: python3 .github/scripts/fetch_bgg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bgg-collection.json
          git diff --staged --quiet || (git commit -m "Update BGG collection data [skip ci]" && git push)
