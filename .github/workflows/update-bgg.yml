name: Update BGG Collection

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install cloudscraper requests

      - name: Fetch BGG data and build collection JSON
        env:
          BGG_USERNAME: ${{ secrets.BGG_USERNAME }}
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import cloudscraper, json, time, os, xml.etree.ElementTree as ET

          USERNAME  = 'Bajomix'
          BGG_USER  = os.environ.get('BGG_USERNAME', '')
          BGG_PASS  = os.environ.get('BGG_PASSWORD', '')

          scraper = cloudscraper.create_scraper(browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False})

          # Login
          if BGG_USER and BGG_PASS:
              print("Logging in...")
              r = scraper.post(
                  'https://boardgamegeek.com/login/api/v1',
                  json={"credentials": {"username": BGG_USER, "password": BGG_PASS}}
              )
              print(f"Login status: {r.status_code}")

          # Fetch collection (with retry for 202)
          coll_url = f'https://boardgamegeek.com/xmlapi2/collection?username={USERNAME}&stats=1&own=1'
          text = None
          for attempt in range(6):
              r = scraper.get(coll_url)
              print(f"Collection attempt {attempt+1}: HTTP {r.status_code}, len={len(r.text)}, preview={r.text[:80]!r}")
              if r.status_code == 200 and '<items' in r.text:
                  text = r.text
                  break
              time.sleep(15)

          if not text:
              raise SystemExit("Failed to fetch collection")

          # Parse collection
          root = ET.fromstring(text)
          games, ids = [], []
          for item in root.findall('item'):
              gid  = item.get('objectid')
              name = item.find('name')
              thumb = item.find('thumbnail')
              stats = item.find('stats')
              ids.append(gid)
              games.append({
                  'id':    gid,
                  'name':  (name.text or '?').strip() if name is not None else '?',
                  'thumb': (thumb.text or '').strip() if thumb is not None else '',
                  'min':   int(stats.get('minplayers', 0)) if stats is not None else 0,
                  'max':   int(stats.get('maxplayers', 0)) if stats is not None else 0,
                  'minT':  int(stats.get('minplaytime', 0)) if stats is not None else 0,
                  'maxT':  int(stats.get('maxplaytime', 0)) if stats is not None else 0,
                  'w':     0.0,
              })
          game_map = {g['id']: g for g in games}
          print(f"Parsed {len(games)} games. Fetching weights...")

          # Fetch weights from thing API in batches of 50
          # Try api.geekdo.com (internal BGG domain) as fallback to boardgamegeek.com
          THING_HOSTS = [
              'https://api.geekdo.com/xmlapi2/thing?stats=1&id=',
              'https://boardgamegeek.com/xmlapi2/thing?stats=1&id=',
          ]
          BATCH = 50
          batches = [ids[i:i+BATCH] for i in range(0, len(ids), BATCH)]
          for bi, batch in enumerate(batches):
              batch_ids = ','.join(batch)
              r = None
              for host in THING_HOSTS:
                  url = host + batch_ids
                  resp = scraper.get(url)
                  print(f"Thing batch {bi+1}/{len(batches)} [{host.split('/')[2]}]: HTTP {resp.status_code}, preview={resp.text[:80]!r}")
                  if resp.status_code == 200 and '<items' in resp.text:
                      r = resp
                      break
              if r is None:
                  print(f"  All hosts failed for batch {bi+1}")
                  time.sleep(3)
                  continue
              try:
                  tr = ET.fromstring(r.text)
                      found = 0
                      for item in tr.findall('item'):
                          gid = item.get('id')
                          if gid in game_map:
                              wEl = item.find('.//averageweight')
                              if wEl is not None:
                                  try:
                                      game_map[gid]['w'] = round(float(wEl.get('value', 0) or 0), 3)
                                      found += 1
                                  except Exception:
                                      pass
                      print(f"  → weights found: {found}")
                  except Exception as e:
                      print(f"  Parse error: {e}")
              time.sleep(3)

          with open('bgg-collection.json', 'w', encoding='utf-8') as f:
              json.dump(games, f, ensure_ascii=False)

          has_w = sum(1 for g in games if g['w'] > 0)
          print(f"Done! {len(games)} games, {has_w} with weight data.")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bgg-collection.json
          git diff --staged --quiet || (git commit -m "Update BGG collection data [skip ci]" && git push)
